function internalTransferToChatBox(content){ const m=content.match(/🧧TRANSFER\|([\d.]+)\|([^🧧]*)🧧/); if(m){ let amount=m[1], note=m[2]; return `*￥${amount} 请对方接收<br>${note}*`; } return content; }
function chatBoxTransferToInternal(content){ const m=content.match(/^\*￥([\d.]+) 请对方接收<br>(.*)\*$/); if(m){ let amount=m[1], note=m[2]; return `🧧TRANSFER|${amount}|${note}🧧`; } return content; }

async function importChatBoxData(file){
    if(!file) return;
    const reader=new FileReader();
    reader.onload=async (e)=>{
        try{
            let json=JSON.parse(e.target.result);
            let sessions=json["chat-sessions-list"];
            if(!sessions||sessions.length===0) throw new Error("没有找到会话");
            let sessionId=sessions[0].id;
            let sessionKey=`session:${sessionId}`;
            let session=json[sessionKey];
            if(!session||!session.messages) throw new Error("会话数据无效");
            let messages=session.messages;
            let systemMsg=messages.find(m=>m.role==="system");
            let personaContent="";
            if(systemMsg && systemMsg.contentParts && systemMsg.contentParts[0]) personaContent=systemMsg.contentParts[0].text;
            let convMessages=messages.filter(m=>m.role==="user"||m.role==="assistant");
            let newMessages=[];
            for(let msg of convMessages){
                let content="";
                if(msg.contentParts && msg.contentParts[0]) content=msg.contentParts[0].text;
                content=chatBoxTransferToInternal(content);
                let newMsg={ id:generateMsgId(), role:msg.role, content:content, timestamp:msg.timestamp||Date.now(), versions:[content], currentVersionIndex:0, fullVersions:[[content]] };
                newMessages.push(newMsg);
            }
            newMessages.sort((a,b)=>a.timestamp-b.timestamp);
            const modal=document.getElementById("genericModal");
            const modalTitle=document.getElementById("modalTitle");
            const modalBody=document.getElementById("modalBody");
            modalTitle.innerText="导入 ChatBox 数据";
            modalBody.innerHTML=`<p>选择导入方式：</p><div><label><input type="radio" name="importOption" value="current" checked> 导入到当前角色（覆盖现有聊天记录）</label></div><div><label><input type="radio" name="importOption" value="new"> 新建角色</label></div>`;
            modal.style.display="flex";
            const confirmBtn=document.getElementById("modalConfirmBtn");
            const cancelBtn=document.getElementById("modalCancelBtn");
            const closeModal=()=>modal.style.display="none";
            let selectedOption="current";
            document.querySelectorAll('input[name="importOption"]').forEach(radio=>{ radio.addEventListener("change",e=>{ selectedOption=e.target.value; }); });
            confirmBtn.onclick=()=>{
                closeModal();
                if(selectedOption==="new"){
                    let newRoleName=prompt("请输入联系人备注:","导入的角色");
                    let newAiName = prompt("角色姓名（AI自称）", newRoleName);
                    if(!newAiName) newAiName = newRoleName;
                    if(newRoleName && !roles.includes(newRoleName)){
                        roles.push(newRoleName);
                        roleData[newRoleName]={ messages:newMessages, location:"家中卧室", schedule:{today:[],tomorrow:[]}, memoryFacts:[], pendingMemoryFacts:[], worldbook:{人物:[],地点:[],世界观:[],自定义:[]}, persona:personaContent||`你叫${newAiName}，自然聊天，短句回复。`, aiName:newAiName, userName:"", userPersona:"", avatar:"", userAvatar:"", chatBackground:"", lastLocationUpdate:Date.now(), params:{ contextRange:"20", temperature:0.7, topP:0.8, maxTokens:1024, autoMemEnable:false, autoMemInterval:30 }, msgSinceLastSummary:0, activeMsg:{ enabled:false, dailyLimit:10, stopThreshold:5, activeInterval:90, pollInterval:15, sentToday:0, lastCheckDate:new Date().toDateString(), consecutiveNoReply:0, lastUserMsgTime:Date.now() }, contextSummary: { text: "", coveredCount: 0, lastUpdateMsgCount: 0, lastAttemptTime: 0 } };
                        saveAll();
                        refreshRoleSelects();
                        renderRolesList();
                        showToast(`已导入到新角色：${newRoleName}`);
                    }else showToast("角色名无效或已存在");
                }else{
                    let curData=getCurrentData();
                    let existingMsgs=curData.messages;
                    let allMsgs=[...existingMsgs,...newMessages];
                    let uniqueMap=new Map();
                    for(let msg of allMsgs){ let key=`${msg.role}_${msg.content}_${msg.timestamp}`; if(!uniqueMap.has(key)) uniqueMap.set(key,msg); }
                    let mergedMsgs=Array.from(uniqueMap.values());
                    mergedMsgs.sort((a,b)=>a.timestamp-b.timestamp);
                    curData.messages=mergedMsgs;
                    if(personaContent) curData.persona=personaContent;
                    curData.contextSummary = { text: "", coveredCount: 0, lastUpdateMsgCount: curData.messages.length, lastAttemptTime: 0 };
                    saveAll();
                    renderChat();
                    showToast("已导入到当前角色，聊天记录已合并");
                    setTimeout(() => regenerateSummaryAsync(true), 500);
                }
            };
            cancelBtn.onclick=closeModal;
        }catch(err){ showToast("导入失败: "+err.message); }
    };
    reader.readAsText(file);
}
function exportToChatBox(){
    let data=getCurrentData();
    let sessionId=crypto.randomUUID?crypto.randomUUID():Date.now().toString();
    let messages=[];
    if(data.persona) messages.push({ id:crypto.randomUUID?crypto.randomUUID():Date.now().toString(), role:"system", contentParts:[{type:"text",text:data.persona}], timestamp:Date.now() });
    for(let msg of data.messages){
        let content=internalTransferToChatBox(msg.content);
        messages.push({ id:(crypto.randomUUID?crypto.randomUUID():Date.now().toString())+Math.random(), role:msg.role, contentParts:[{type:"text",text:content}], timestamp:msg.timestamp });
    }
    let exportObj={ "__exported_items":["conversations","copilot"], "__exported_at":new Date().toISOString(), "chat-sessions-list":[{ id:sessionId, name:currentRole, starred:false, type:"chat" }], "configVersion":14, "myCopilots":[], [`session:${sessionId}`]:{ name:currentRole, type:"chat", messages:messages } };
    let jsonStr=JSON.stringify(exportObj,null,2);
    download(jsonStr,`chatbox_export_${currentRole}.json`,"application/json");
    showToast("已导出为 ChatBox 格式");
}

async function checkAutoSummary(){
    let data=getCurrentData();
    if(!data.params.autoMemEnable) return;
    data.msgSinceLastSummary=(data.msgSinceLastSummary||0)+1;
    if(data.msgSinceLastSummary>=data.params.autoMemInterval){
        await summarizeLongTermMemory(true);
        data.msgSinceLastSummary=0;
        saveAll();
    }
    saveAll();
}
async function summarizeLongTermMemory(silent=false){
    let data=getCurrentData();
    if(data.messages.length<10){ if(!silent) showToast("对话内容太少，无法总结"); return; }
    if(!silent) showToast("正在总结记忆...");
    let recent=data.messages.slice(-15).map(m=>`${m.role==='user'?(data.userName||"用户"):data.aiName}: ${m.content}`).join("\n");
    let prompt=`根据以下最近的对话内容，提炼出需要长期记住的用户偏好、关系、重要事件等。输出JSON数组格式，每个元素是一条记忆字符串。\n最近对话：\n${recent}`;
    let config=getMemorySummaryApiConfig();
    if(!config.apiKey){ if(!silent) showToast("未配置任何 API Key，无法总结"); return; }
    try{
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 30000);
        let res = await fetch(`${config.baseUrl}/chat/completions`,{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":`Bearer ${config.apiKey}`
            },
            body:JSON.stringify({
                model:config.model,
                messages:[
                    {role:"system",content:"你是记忆管理助手，输出JSON数组。"},
                    {role:"user",content:prompt}
                ],
                temperature:config.temperature,
                max_tokens:config.maxTokens
            }),
            signal: controller.signal
        });
        clearTimeout(timeoutId);
        if(!res.ok){
            let errorText = await res.text();
            throw new Error(`API错误 ${res.status}: ${errorText.substring(0,200)}`);
        }
        let json = await res.json();
        let content = json.choices[0].message.content;
        let match = content.match(/\[[\s\S]*?\]/);
        if(match) content = match[0];
        let newMemories = JSON.parse(content);
        if(Array.isArray(newMemories)){
            for(let item of newMemories){
                let txt = typeof item === 'string' ? item : (item.text || item.content || item.memory || JSON.stringify(item));
                if(txt && !data.pendingMemoryFacts.some(f=>f.text===txt)){
                    data.pendingMemoryFacts.push({ id:generateMsgId(), text:txt, timestamp:Date.now(), importance:0.7 });
                }
            }
            saveAll();
            let msg = `记忆总结完成，已添加 ${newMemories.length} 条待确认记忆`;
            if(!silent) showToast(msg);
            if(currentEditRole && document.getElementById("memoryPendingView")){
                renderPendingMemoryFacts();
                updatePendingBadge();
                switchMemoryView('pending');
            }
        } else {
            throw new Error("返回数据不是数组");
        }
    }catch(e){
        console.error(e);
        let errorMsg = e.message;
        if(errorMsg.includes("signal is aborted")) errorMsg = "请求超时，请检查网络后重试";
        else if(errorMsg.includes("JSON")) errorMsg = "API返回数据格式错误，可能是模型输出异常";
        else if(errorMsg.includes("429")) errorMsg = "请求过于频繁，请稍后再试";
        alert("总结失败详情:\n" + errorMsg);
        if(!silent) showToast("总结失败: "+errorMsg);
    }
}
</script>
