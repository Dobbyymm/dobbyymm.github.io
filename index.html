    function performSearch(keyword) {
        const container = document.getElementById("searchResultsContainer");
        const statsDiv = document.getElementById("searchStats");
        if (!keyword.trim()) {
            container.innerHTML = '<div class="no-result">输入关键词开始搜索</div>';
            statsDiv.innerHTML = "";
            return;
        }
        const data = getCurrentData();
        const messages = data.messages || [];
        const lowerKeyword = keyword.toLowerCase();
        const results = [];
        for (let i = 0; i < messages.length; i++) {
            const msg = messages[i];
            const content = msg.content || "";
            if (content.toLowerCase().includes(lowerKeyword)) {
                results.push({ index: i, msg });
            }
        }
        if (results.length === 0) {
            container.innerHTML = '<div class="no-result">未找到相关消息</div>';
            statsDiv.innerHTML = "共 0 条";
            return;
        }
        statsDiv.innerHTML = `共 ${results.length} 条结果`;
        let html = "";
        for (let res of results) {
            const msg = res.msg;
            const roleLabel = msg.role === "user" ? "我" : currentRole;
            const timestamp = msg.timestamp ? new Date(msg.timestamp).toLocaleString() : "未知时间";
            let preview = msg.content;
            const regex = new RegExp(`(${escapeRegex(keyword)})`, "gi");
            preview = preview.replace(regex, `<mark>$1</mark>`);
            html += `
                <div class="search-result-item" data-msg-id="${msg.id}" data-msg-index="${res.index}">
                    <div class="result-preview">${preview}</div>
                    <div class="result-meta">
                        <span>${roleLabel}</span>
                        <span>${timestamp}</span>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
        document.querySelectorAll(".search-result-item").forEach(el => {
            el.addEventListener("click", (e) => {
                const msgId = parseInt(el.dataset.msgId);
                jumpToMessage(msgId);
                closeSearchModal();
            });
        });
    }
    function escapeRegex(str) {
        return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }
    function jumpToMessage(msgId) {
        const targetElement = document.querySelector(`.message-row[data-msg-id="${msgId}"]`);
        if (targetElement) {
            targetElement.scrollIntoView({ behavior: "smooth", block: "center" });
            const msgDiv = targetElement.querySelector('.message');
            if (msgDiv) {
                msgDiv.classList.add("message-highlight");
                setTimeout(() => msgDiv.classList.remove("message-highlight"), 2000);
            }
        } else {
            renderChat();
            setTimeout(() => {
                const el = document.querySelector(`.message-row[data-msg-id="${msgId}"]`);
                if (el) {
                    el.scrollIntoView({ behavior: "smooth", block: "center" });
                    const msgDiv = el.querySelector('.message');
                    if (msgDiv) {
                        msgDiv.classList.add("message-highlight");
                        setTimeout(() => msgDiv.classList.remove("message-highlight"), 2000);
                    }
                } else {
                    showToast("消息定位失败");
                }
            }, 100);
        }
    }

    // ================== 角色下拉菜单 ==================
    function updateRoleDropdownMenu() {
        const menu = document.getElementById("roleDropdownMenu");
        if (!menu) return;
        let html = "";
        for (let role of roles) {
            const avatar = (roleData[role] && roleData[role].avatar) || "";
            const activeClass = role === currentRole ? "active" : "";
            html += `<div class="role-dropdown-item ${activeClass}" data-role="${role}">
                        <div class="role-dropdown-avatar" style="background-image: url('${avatar}'); background-size: cover; background-position: center;">${avatar ? '' : '🤖'}</div>
                        <span>${escapeHtml(role)}</span>
                    </div>`;
        }
        menu.innerHTML = html;
        document.querySelectorAll(".role-dropdown-item").forEach(item => {
            item.addEventListener("click", (e) => {
                const newRole = item.dataset.role;
                if (newRole && newRole !== currentRole) {
                    currentRole = newRole;
                    saveAll();
                    let newData = getCurrentData();
                    if (newData.activeMsg && newData.activeMsg.lastUserMsgTime) {
                        lastUserMessageTime = newData.activeMsg.lastUserMsgTime;
                    } else {
                        lastUserMessageTime = Date.now();
                    }
                    restartActiveMsgTimer();
                    updateChatBackground();
                    renderChat();
                    updateLocationAuto();
                    renderLocationPage();
                    updateRoleDisplay();
                    updateRoleDropdownMenu();
                }
                menu.style.display = "none";
            });
        });
    }
    function toggleRoleDropdown() {
        const menu = document.getElementById("roleDropdownMenu");
        if (menu.style.display === "none" || menu.style.display === "") {
            updateRoleDropdownMenu();
            menu.style.display = "block";
            const closeHandler = (e) => {
                if (!menu.contains(e.target) && e.target.id !== "roleDropdownBtn") {
                    menu.style.display = "none";
                    document.removeEventListener("click", closeHandler);
                }
            };
            setTimeout(() => document.addEventListener("click", closeHandler), 10);
        } else {
            menu.style.display = "none";
        }
    }

    function updateChatBackground() {
        const data = getCurrentData();
        const bg = data.chatBackground || globalWallpaper;
        if (bg) {
            document.getElementById("wallpaperBg").style.backgroundImage = `url(${bg})`;
        } else {
            document.getElementById("wallpaperBg").style.backgroundImage = "url('https://picsum.photos/id/104/800/1200')";
        }
    }

    // 角色管理函数
    function renderRolesList() {
        let container = document.getElementById("rolesListContainer");
        if (!container) return;
        container.innerHTML = roles.map(role => {
            let data = roleData[role] || { avatar: "" };
            let avatarHtml = data.avatar ? `<img class="role-avatar" src="${data.avatar}">` : `<div class="role-avatar">😊</div>`;
            return `<div class="role-card" data-role="${role}">
                        ${avatarHtml}
                        <div class="role-info"><div class="role-name">${escapeHtml(role)}</div></div>
                        <button class="edit-role-btn" data-role="${role}">编辑</button>
                    </div>`;
        }).join('');
        document.querySelectorAll('.edit-role-btn').forEach(btn => btn.onclick = () => openRoleDetail(btn.dataset.role));
    }
    function openRoleDetail(roleName) {
        currentEditRole = roleName;
        document.getElementById("roleDetailTitle").innerText = `编辑 ${roleName}`;
        let data = roleData[roleName] || { avatar: "", userAvatar: "", chatBackground: "", persona: "", longMemories: [], memoryFacts: [], worldbook: {人物:[],地点:[],世界观:[],自定义:[]}, userPersona: "" };
        document.getElementById("editRoleName").value = roleName;
        document.getElementById("editPersonaPrompt").value = data.persona || "";
        document.getElementById("editUserPersona").value = data.userPersona || "";
        const roleAvatarPreview = document.getElementById("roleAvatarPreview");
        if (roleAvatarPreview) {
            if (data.avatar) {
                roleAvatarPreview.style.backgroundImage = `url(${data.avatar})`;
                roleAvatarPreview.style.backgroundSize = "cover";
                roleAvatarPreview.innerText = "";
            } else {
                roleAvatarPreview.style.backgroundImage = "";
                roleAvatarPreview.innerText = "😊";
                roleAvatarPreview.style.fontSize = "40px";
                roleAvatarPreview.style.display = "flex";
                roleAvatarPreview.style.alignItems = "center";
                roleAvatarPreview.style.justifyContent = "center";
            }
        }
        const userAvatarPreview = document.getElementById("userAvatarPreview");
        if (userAvatarPreview) {
            if (data.userAvatar) {
                userAvatarPreview.style.backgroundImage = `url(${data.userAvatar})`;
                userAvatarPreview.style.backgroundSize = "cover";
                userAvatarPreview.innerText = "";
            } else {
                userAvatarPreview.style.backgroundImage = "";
                userAvatarPreview.innerText = "👤";
                userAvatarPreview.style.fontSize = "40px";
            }
        }
        renderEditMemoryFacts();
        renderEditWorldbook();
        document.getElementById("rolesPage").style.display = "none";
        document.getElementById("roleDetailPage").style.display = "flex";
    }
    function renderEditMemoryFacts() {
        let facts = roleData[currentEditRole]?.memoryFacts || [];
        let container = document.getElementById("editMemoryFactsList");
        if (!container) return;
        container.innerHTML = facts.map((fact, idx) => `<div class="item-row">${escapeHtml(fact.text)} <button class="del-mem-fact" data-idx="${idx}">删除</button></div>`).join('');
        document.querySelectorAll('.del-mem-fact').forEach(btn => {
            let idx = parseInt(btn.dataset.idx);
            roleData[currentEditRole].memoryFacts.splice(idx, 1);
            saveAll();
            renderEditMemoryFacts();
        });
    }
    function renderEditWorldbook() {
        let container = document.getElementById("editWorldbookList");
        if (!container) return;
        let wb = roleData[currentEditRole]?.worldbook || { 人物:[], 地点:[], 世界观:[], 自定义:[] };
        let activeCat = document.querySelector("[data-wbcat].active")?.innerText || "人物";
        let items = wb[activeCat] || [];
        container.innerHTML = items.map((it,idx)=>`<div class="item-row">${escapeHtml(it)} <button class="wb-del" data-cat="${activeCat}" data-idx="${idx}">删除</button><button class="wb-edit" data-cat="${activeCat}" data-idx="${idx}">编辑</button></div>`).join('');
        document.querySelectorAll('.wb-del').forEach(btn => { btn.onclick = () => { let cat=btn.dataset.cat, idx=parseInt(btn.dataset.idx); roleData[currentEditRole].worldbook[cat].splice(idx,1); renderEditWorldbook(); }; });
        document.querySelectorAll('.wb-edit').forEach(btn => { btn.onclick = () => { let cat=btn.dataset.cat, idx=parseInt(btn.dataset.idx); let newVal=prompt("编辑", roleData[currentEditRole].worldbook[cat][idx]); if(newVal){ roleData[currentEditRole].worldbook[cat][idx]=newVal; renderEditWorldbook(); } }; });
    }
    function addWorldbookEntry() {
        let name=document.getElementById("newWbName").value, cont=document.getElementById("newWbContent").value, cat=document.getElementById("newWbCat").value;
        if(name||cont){ let entry=`${name}: ${cont}`; if(!roleData[currentEditRole].worldbook[cat]) roleData[currentEditRole].worldbook[cat]=[]; roleData[currentEditRole].worldbook[cat].push(entry); renderEditWorldbook(); document.getElementById("newWbName").value=""; document.getElementById("newWbContent").value=""; }
    }
    function addMemoryFact() {
        let text = prompt("添加新事实:");
        if (text && text.trim()) {
            if (!roleData[currentEditRole].memoryFacts) roleData[currentEditRole].memoryFacts = [];
            roleData[currentEditRole].memoryFacts.push({ id: Date.now(), text: text.trim(), timestamp: Date.now(), importance: 0.7 });
            saveAll();
            renderEditMemoryFacts();
            showToast("已添加记忆事实");
        }
    }
    function saveCurrentRoleDetail() {
        let newName = document.getElementById("editRoleName").value.trim();
        let persona = document.getElementById("editPersonaPrompt").value;
        let userPersona = document.getElementById("editUserPersona").value;
        if(!roleData[currentEditRole]) roleData[currentEditRole] = {};
        if(newName && newName !== currentEditRole) {
            let idx = roles.indexOf(currentEditRole);
            if(idx !== -1) roles[idx] = newName;
            roleData[newName] = roleData[currentEditRole];
            delete roleData[currentEditRole];
            currentEditRole = newName;
            if(currentRole === currentEditRole) currentRole = newName;
        }
        roleData[currentEditRole].persona = persona;
        roleData[currentEditRole].userPersona = userPersona;
        saveAll();
        showToast("已保存");
        updateRoleDropdownMenu();
        updateRoleDisplay();
        renderRolesList();
    }
    function deleteCurrentRole() {
        if(roles.length <= 1) { showToast("至少保留一个角色"); return; }
        if(confirm(`删除角色 "${currentEditRole}"？不可恢复。`)) {
            let idx = roles.indexOf(currentEditRole);
            if(idx !== -1) roles.splice(idx,1);
            delete roleData[currentEditRole];
            if(currentRole === currentEditRole) currentRole = roles[0];
            saveAll();
            updateRoleDropdownMenu();
            updateRoleDisplay();
            renderRolesList();
            document.getElementById("roleDetailPage").style.display = "none";
            document.getElementById("rolesPage").style.display = "flex";
            renderChat();
        }
    }
    function addNewRoleFromList() {
        let newName = prompt("新角色名");
        if(newName && !roles.includes(newName)) {
            roles.push(newName);
            roleData[newName] = { messages: [], location: "家中卧室", schedule: { today: [], tomorrow: [] }, longMemories: [], memoryFacts: [], worldbook: {人物:[],地点:[],世界观:[],自定义:[]}, persona: `你叫${newName}，自然聊天，短句回复。`, avatar: "", userAvatar: "", chatBackground: "", userPersona: "", params: { contextRange: "20", temperature: 0.7, topP: 0.8, maxTokens: 1024, autoMemEnable: false, autoMemInterval: 30 }, msgSinceLastSummary: 0, activeMsg: { enabled: false, dailyLimit: 10, stopThreshold: 5, activeInterval: 90, pollInterval: 15, sentToday: 0, lastCheckDate: new Date().toDateString(), consecutiveNoReply: 0, lastUserMsgTime: Date.now() } };
            saveAll();
            updateRoleDropdownMenu();
            renderRolesList();
            showToast(`已添加 ${newName}`);
        }
    }

    function loadRoleParamsUI() {
        let data = getCurrentData();
        let p = data.params;
        document.getElementById("paramContextRange").value = p.contextRange || "20";
        document.getElementById("paramTemp").value = p.temperature || 0.7;
        document.getElementById("paramTopP").value = p.topP || 0.8;
        document.getElementById("paramMaxTokens").value = p.maxTokens || 1024;
        document.getElementById("autoMemEnable").checked = p.autoMemEnable || false;
        document.getElementById("autoMemInterval").value = p.autoMemInterval || 30;
        let a = data.activeMsg;
        document.getElementById("activeMsgEnable").checked = a.enabled;
        document.getElementById("dailyLimit").value = a.dailyLimit;
        document.getElementById("stopThreshold").value = a.stopThreshold;
        document.getElementById("activeInterval").value = a.activeInterval;
        document.getElementById("pollInterval").value = a.pollInterval;
        let autoDiv = document.getElementById("autoMemCollapsible");
        let activeDiv = document.getElementById("activeMsgCollapsible");
        if (autoDiv) autoDiv.classList.toggle("hidden", !p.autoMemEnable);
        if (activeDiv) activeDiv.classList.toggle("hidden", !a.enabled);
    }
    function saveRoleParamsFromModal() {
        let data = getCurrentData();
        data.params.contextRange = document.getElementById("paramContextRange").value;
        data.params.temperature = parseFloat(document.getElementById("paramTemp").value);
        data.params.topP = parseFloat(document.getElementById("paramTopP").value);
        data.params.maxTokens = parseInt(document.getElementById("paramMaxTokens").value);
        data.params.autoMemEnable = document.getElementById("autoMemEnable").checked;
        data.params.autoMemInterval = parseInt(document.getElementById("autoMemInterval").value);
        let a = data.activeMsg;
        a.enabled = document.getElementById("activeMsgEnable").checked;
        a.dailyLimit = parseInt(document.getElementById("dailyLimit").value);
        a.stopThreshold = parseInt(document.getElementById("stopThreshold").value);
        a.activeInterval = parseInt(document.getElementById("activeInterval").value);
        a.pollInterval = parseInt(document.getElementById("pollInterval").value);
        saveAll();
        showToast("角色参数已保存");
        document.getElementById("roleParamsModal").style.display = "none";
        restartActiveMsgTimer();
    }
    function openRoleParams() {
        loadRoleParamsUI();
        document.getElementById("roleParamsModal").style.display = "flex";
    }

    // 导入导出
    async function importChatBoxData(file) { showToast("功能开发中"); }
    function exportToChatBox() { showToast("功能开发中"); }
    function exportChat() { showToast("功能开发中"); }
    function exportPersona() { showToast("功能开发中"); }
    function importPersona() { showToast("功能开发中"); }
    function backupAll() { let backup={ roles, roleData, lastActiveDate, activeMsgCountToday, globalWallpaper }; download(JSON.stringify(backup), "backup.json", "application/json"); }
    function restoreAll(file) { let reader=new FileReader(); reader.onload=e=>{ let d=JSON.parse(e.target.result); if(d.roles && d.roleData) { roles=d.roles; roleData=d.roleData; globalWallpaper=d.globalWallpaper||""; location.reload(); } }; if(file) reader.readAsText(file); }
    function resetAll() { if(confirm("重置所有数据？不可恢复")){ localStorage.clear(); location.reload(); } }
    function updateRoleDisplay() {
        let displayElem = document.getElementById("roleDisplay");
        if (displayElem) displayElem.innerText = currentRole;
    }
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p=>p.style.display='none');
        document.getElementById(pageId).style.display = 'flex';
        if(pageId === 'chatPage') { updateChatBackground(); renderChat(); updateLocationAuto(); updateRoleDisplay(); }
        if(pageId === 'locationPage') { updateLocationAuto(); renderLocationPage(); }
        if(pageId === 'rolesPage') renderRolesList();
        if(pageId === 'hotPage') fetchHotNews();
        if(pageId === 'settingsPage') loadApiSettingsUI();
    }
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function scrollChatBottom() { let c = document.getElementById("chatMessagesContainer"); if(c) c.scrollTop = c.scrollHeight; }
    function showToast(msg) { let t = document.getElementById("toast"); t.innerText = msg; t.style.display = "block"; setTimeout(() => t.style.display = "none", 2000); }
    function download(content, filename, type) { let a = document.createElement('a'); let blob = new Blob([content], {type}); a.href = URL.createObjectURL(blob); a.download = filename; a.click(); }

    function setupCollapsibles() {
        const autoMemCheck = document.getElementById("autoMemEnable");
        const autoMemDiv = document.getElementById("autoMemCollapsible");
        const activeMsgCheck = document.getElementById("activeMsgEnable");
        const activeMsgDiv = document.getElementById("activeMsgCollapsible");
        if (autoMemCheck && autoMemDiv) autoMemCheck.addEventListener("change", () => autoMemDiv.classList.toggle("hidden", !autoMemCheck.checked));
        if (activeMsgCheck && activeMsgDiv) activeMsgCheck.addEventListener("change", () => activeMsgDiv.classList.toggle("hidden", !activeMsgCheck.checked));
    }

    // 图片上传处理函数
    function handleImageUpload(callback) {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "image/*";
        input.onchange = async (e) => {
            if (e.target.files.length) {
                try {
                    const dataUrl = await compressAndUpload(e.target.files[0], 300, 0.7);
                    callback(dataUrl);
                } catch (err) {
                    showToast("图片处理失败");
                }
            }
        };
        input.click();
    }

    // 事件绑定
    document.querySelectorAll('[data-page]').forEach(el => el.onclick = () => showPage(el.dataset.page + "Page"));
    document.querySelectorAll('[data-home]').forEach(btn => btn.onclick = () => showPage("homePage"));
    document.getElementById("sendMessageBtn").onclick = () => sendMessage(document.getElementById("messageInput").value);
    document.getElementById("openRoleParamsBtn").onclick = openRoleParams;
    document.getElementById("closeParamsModal").onclick = () => document.getElementById("roleParamsModal").style.display = "none";
    document.getElementById("saveParamsBtn").onclick = saveRoleParamsFromModal;
    document.getElementById("saveApiSettingsBtn").onclick = saveApiSettings;
    document.getElementById("hotRefreshBtn").onclick = fetchHotNews;
    document.getElementById("addRoleListBtn").onclick = addNewRoleFromList;
    document.getElementById("backToRolesBtn").onclick = () => { document.getElementById("roleDetailPage").style.display = "none"; document.getElementById("rolesPage").style.display = "flex"; };
    document.getElementById("deleteRoleBtn").onclick = deleteCurrentRole;
    document.getElementById("savePersonaBtn").onclick = () => { saveCurrentRoleDetail(); };
    document.getElementById("saveUserPersonaBtn").onclick = () => { saveCurrentRoleDetail(); };
    document.getElementById("addWbEntryBtn").onclick = addWorldbookEntry;
    document.getElementById("addMemoryFactBtn").onclick = addMemoryFact;
    document.getElementById("manualSummarizeBtn").onclick = () => { summarizeLongTermMemory(false); };
    document.getElementById("toggleScheduleBtn").onclick = () => {
        let details = document.getElementById("scheduleDetails");
        let btn = document.getElementById("toggleScheduleBtn");
        if (details.style.display === "none") {
            details.style.display = "block";
            btn.innerHTML = "▲ 收起";
        } else {
            details.style.display = "none";
            btn.innerHTML = "▼ 展开";
        }
    };
    document.querySelectorAll("[data-role-tab]").forEach(btn => {
        btn.onclick = () => {
            let tab = btn.dataset.roleTab;
            document.getElementById("rolePersonaArea").style.display = tab==="persona"?"block":"none";
            document.getElementById("roleMemoryArea").style.display = tab==="memory"?"block":"none";
            document.getElementById("roleWorldArea").style.display = tab==="world"?"block":"none";
            document.getElementById("roleUserArea").style.display = tab==="user"?"block":"none";
            document.querySelectorAll("[data-role-tab]").forEach(b=>b.classList.remove("active"));
            btn.classList.add("active");
        };
    });
    document.querySelectorAll(".world-cat-btn").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".world-cat-btn").forEach(b=>b.classList.remove("active"));
            btn.classList.add("active");
            renderEditWorldbook();
        };
    });
    document.getElementById("exportChatBtn").onclick = exportChat;
    document.getElementById("exportPersonaBtn").onclick = exportPersona;
    document.getElementById("importPersonaBtn").onclick = importPersona;
    document.getElementById("importChatBoxBtn").onclick = () => { let inp = document.createElement("input"); inp.type="file"; inp.accept=".json"; inp.onchange = e => importChatBoxData(e.target.files[0]); inp.click(); };
    document.getElementById("exportChatBoxBtn").onclick = exportToChatBox;
    document.getElementById("backupAllBtn").onclick = backupAll;
    document.getElementById("restoreAllBtn").onclick = () => { let inp = document.createElement("input"); inp.type="file"; inp.accept=".json"; inp.onchange = e => restoreAll(e.target.files[0]); inp.click(); };
    document.getElementById("resetDataBtn").onclick = resetAll;
    document.getElementById("clearDebugLogsBtn").onclick = clearDebugLogs;
    document.getElementById("copyDebugLogsBtn").onclick = copyDebugLogs;
    document.getElementById("exportDebugLogsBtn").onclick = exportDebugLogs;
    document.getElementById("secondaryApiEnabled").addEventListener("change", toggleSecondarySettingsUI);
    document.getElementById("saveSecondarySettingsBtn").onclick = saveSecondarySettings;
    document.getElementById("visionApiEnabled").addEventListener("change", () => { toggleVisionSettingsUI(); updateImageUploadButtonVisibility(); });
    document.getElementById("saveVisionSettingsBtn").onclick = saveVisionSettings;
    document.getElementById("imageUploadBtn").onclick = () => {
        let input = document.createElement("input");
        input.type = "file";
        input.accept = "image/*";
        input.onchange = (e) => {
            if (e.target.files.length) sendImageMessage(e.target.files[0]);
        };
        input.click();
    };
    // 搜索相关
    document.getElementById("searchChatBtn").onclick = openSearchModal;
    document.getElementById("closeSearchModalBtn").onclick = closeSearchModal;
    document.getElementById("searchKeywordInput").addEventListener("input", (e) => performSearch(e.target.value));
    document.getElementById("searchModal").addEventListener("click", (e) => {
        if (e.target === document.getElementById("searchModal")) closeSearchModal();
    });
    // 角色下拉
    document.getElementById("roleDropdownBtn").onclick = toggleRoleDropdown;

    // 全局壁纸上传
    document.getElementById("uploadGlobalWallpaperBtn").onclick = () => {
        handleImageUpload((dataUrl) => {
            globalWallpaper = dataUrl;
            document.getElementById("wallpaperBg").style.backgroundImage = `url(${globalWallpaper})`;
            saveAll();
            showToast("全局背景已更新");
        });
    };
    document.getElementById("resetGlobalWallpaperBtn").onclick = () => {
        globalWallpaper = "";
        document.getElementById("wallpaperBg").style.backgroundImage = "url('https://picsum.photos/id/104/800/1200')";
        saveAll();
        showToast("已重置默认背景");
    };
    // 角色头像上传
    document.getElementById("uploadRoleAvatarBtn").onclick = () => {
        if (!currentEditRole) return;
        handleImageUpload((dataUrl) => {
            roleData[currentEditRole].avatar = dataUrl;
            saveAll();
            const preview = document.getElementById("roleAvatarPreview");
            if (preview) {
                preview.style.backgroundImage = `url(${dataUrl})`;
                preview.style.backgroundSize = "cover";
                preview.innerText = "";
            }
            showToast("角色头像已更新");
        });
    };
    document.getElementById("resetRoleAvatarBtn").onclick = () => {
        if (!currentEditRole) return;
        roleData[currentEditRole].avatar = "";
        saveAll();
        const preview = document.getElementById("roleAvatarPreview");
        if (preview) {
            preview.style.backgroundImage = "";
            preview.innerText = "😊";
            preview.style.fontSize = "40px";
        }
        showToast("已重置为默认头像");
    };
    // 用户头像上传
    document.getElementById("uploadUserAvatarBtn").onclick = () => {
        if (!currentEditRole) return;
        handleImageUpload((dataUrl) => {
            roleData[currentEditRole].userAvatar = dataUrl;
            saveAll();
            const preview = document.getElementById("userAvatarPreview");
            if (preview) {
                preview.style.backgroundImage = `url(${dataUrl})`;
                preview.style.backgroundSize = "cover";
                preview.innerText = "";
            }
            showToast("用户头像已更新");
        });
    };
    document.getElementById("resetUserAvatarBtn").onclick = () => {
        if (!currentEditRole) return;
        roleData[currentEditRole].userAvatar = "";
        saveAll();
        const preview = document.getElementById("userAvatarPreview");
        if (preview) {
            preview.style.backgroundImage = "";
            preview.innerText = "👤";
            preview.style.fontSize = "40px";
        }
        showToast("已重置为默认头像");
    };
    // 角色聊天背景上传
    document.getElementById("uploadRoleBgBtn").onclick = () => {
        if (!currentEditRole) return;
        handleImageUpload((dataUrl) => {
            roleData[currentEditRole].chatBackground = dataUrl;
            saveAll();
            if (currentRole === currentEditRole) {
                updateChatBackground();
            }
            showToast("角色聊天背景已更新");
        });
    };
    document.getElementById("resetRoleBgBtn").onclick = () => {
        if (!currentEditRole) return;
        roleData[currentEditRole].chatBackground = "";
        saveAll();
        if (currentRole === currentEditRole) {
            updateChatBackground();
        }
        showToast("已重置为全局背景");
    };

    // 启动
    loadAll();
    loadApiSettingsUI();
    updateLocationAuto();
    generateTodaySchedule();
    setupCollapsibles();
    updateRoleDisplay();
    if (getCurrentData().activeMsg.enabled) startActiveMsgTimer();
    showPage("homePage");
</script>
